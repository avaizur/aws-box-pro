# =============================================================
# application.properties — AI Document Analysis Java API
# =============================================================

server.port=8080

# ── SQLite Database ───────────────────────────────────────────
# On EC2 the file lives at /opt/myproject/data/app.db
# For local dev, override via env var: SQLITE_DB_PATH
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:/opt/myproject/data/app.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Python AI Service ─────────────────────────────────────────
# URL of the Python Flask service (same EC2, different port)
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}

# ── Amazon S3 ─────────────────────────────────────────────────
# Credentials come from EC2 IAM Role — no keys needed in code
cloud.aws.region.static=${AWS_REGION:us-east-1}
app.s3.bucket-name=${S3_BUCKET_NAME:ai-doc-analysis-pilot}

# ── File upload limits ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──────────────────────────────────────────────────
logging.file.name=${LOG_DIR:/opt/myproject/logs}/java-api.log
logging.level.com.aidocanalysis=INFO
logging.level.root=WARN
