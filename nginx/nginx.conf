###############################################################
# nginx.conf — AI Document Analysis Service
# Reverse proxy routing for the single-EC2 pilot
###############################################################

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    access_log /opt/myproject/logs/nginx-access.log;
    error_log  /opt/myproject/logs/nginx-error.log;

    server {
        listen 80;
        server_name _;   # Accepts any hostname / raw IP

        # ── React Frontend (/  → :3000) ─────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Java Spring Boot API (/api/* → :8080) ───────────────
        location /api/ {
            proxy_pass         http://127.0.0.1:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # Allow larger file uploads
            client_max_body_size 15M;
        }

        # ── Python Flask AI Service (/ai/* → :5000) ─────────────
        # Note: /ai/ prefix is stripped; Flask sees /analyze, /health etc.
        location /ai/ {
            proxy_pass         http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Uploaded files served directly from disk ─────────────
        location /uploads/ {
            alias /opt/myproject/uploads/;
            autoindex off;
        }
    }
}
